<div class="relative w-full select-none">
  <!-- Viewport: clips the zoomed/panned content -->
  <div
    #viewport
    class="relative w-full overflow-hidden rounded-xl bg-teal-deep/30 border border-teal-deep/50"
    [class.touch-none]="canPan()"
    [class.touch-pan-y]="!canPan()"
    [class.cursor-grab]="canPan() && !isDragging()"
    [class.cursor-grabbing]="isDragging()"
    [style.aspect-ratio]="aspectRatio()"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp($event)"
    (pointercancel)="onPointerUp($event)"
    (wheel)="onWheel($event)"
  >
    <!-- Stage: image + overlay share one box. Zoom changes the box SIZE (so the
         browser re-samples the full-res image and stays crisp); translate pans. -->
    <div
      class="absolute left-0 top-0 origin-top-left will-change-transform"
      [style.width.%]="zoom() * 100"
      [style.height.%]="zoom() * 100"
      [style.transform]="transform()"
    >
      <img
        #img
        [src]="imageSrc()"
        [alt]="image()"
        (load)="onImageLoad(img)"
        draggable="false"
        class="block h-full w-full object-fill pointer-events-none"
      />

      @if (viewBox(); as vb) {
        <svg
          class="absolute inset-0 h-full w-full"
          [attr.viewBox]="vb"
          preserveAspectRatio="xMidYMid meet"
        >
          @for (m of markers(); track m.name) {
            @if (m.kind === 'circle') {
              <circle
                class="pcb-marker"
                [class.pcb-marker--selected]="selected() === m.id"
                [attr.cx]="m.cx"
                [attr.cy]="m.cy"
                [attr.r]="m.r"
                vector-effect="non-scaling-stroke"
                (click)="onPartClick(m.part)"
              >
                <title>{{ m.label || m.name }}</title>
              </circle>
            } @else {
              <rect
                class="pcb-marker"
                [class.pcb-marker--selected]="selected() === m.id"
                [attr.x]="m.x"
                [attr.y]="m.y"
                [attr.width]="m.width"
                [attr.height]="m.height"
                rx="14"
                vector-effect="non-scaling-stroke"
                (click)="onPartClick(m.part)"
              >
                <title>{{ m.label || m.name }}</title>
              </rect>
            }
          }
        </svg>
      }
    </div>
  </div>

  <!-- Zoom controls (below the preview) -->
  <div class="mt-3 flex flex-row gap-2">
    <button
      type="button"
      (click)="zoomIn()"
      [disabled]="!canZoomIn()"
      aria-label="Zoom in"
      class="grid h-10 w-10 place-items-center rounded-full cursor-pointer border border-teal-trace/60 bg-teal-deep/90 text-cream shadow-md transition-colors hover:bg-teal-deep disabled:cursor-not-allowed disabled:opacity-40"
    >
      <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" d="M12 5v14M5 12h14" />
      </svg>
    </button>
    <button
      type="button"
      (click)="zoomOut()"
      [disabled]="!canZoomOut()"
      aria-label="Zoom out"
      class="grid h-10 w-10 place-items-center rounded-full cursor-pointer border border-teal-trace/60 bg-teal-deep/90 text-cream shadow-md transition-colors hover:bg-teal-deep disabled:cursor-not-allowed disabled:opacity-40"
    >
      <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" d="M5 12h14" />
      </svg>
    </button>
    <button
      type="button"
      (click)="reset()"
      [disabled]="!canZoomOut() && !selected()"
      aria-label="Reset zoom"
      class="grid h-10 w-10 place-items-center rounded-full cursor-pointer border border-teal-trace/60 bg-teal-deep/90 text-cream shadow-md transition-colors hover:bg-teal-deep disabled:cursor-not-allowed disabled:opacity-40"
    >
      <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M4 9a8 8 0 0113.7-3.7L20 8m0-4v4h-4M20 15a8 8 0 01-13.7 3.7L4 16m0 4v-4h4"
        />
      </svg>
    </button>

    <!-- Toggle between the assembled (components) view and the bare PCB. -->
    @if (canToggle()) {
      <button
        type="button"
        (click)="toggleComponents()"
        [attr.aria-pressed]="showComponents()"
        [attr.aria-label]="showComponents() ? 'Show bare PCB' : 'Show components'"
        [class]="toggleClass()"
      >
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="7" y="7" width="10" height="10" rx="1.5" />
          <path
            stroke-linecap="round"
            d="M10 4v3M14 4v3M10 17v3M14 17v3M4 10h3M4 14h3M17 10h3M17 14h3"
          />
        </svg>
      </button>
    }
  </div>
</div>
