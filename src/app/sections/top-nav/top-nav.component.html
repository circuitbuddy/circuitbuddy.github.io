<!-- ============ NAV ============ -->
<header class="sticky top-0 z-50 bg-[#1b6966] backdrop-blur border-b-4 border-yellow-400">
  <nav class="max-w-6xl mx-auto flex items-center justify-between px-4 py-3">
    <a href="#top" class="flex items-center gap-2" aria-label="Circuit Buddy home">
      <img src="/assets/circuit-buddy-web-logo.png" alt="Circuit Buddy logo" class="h-10" />
    </a>

    <!-- Mobile menu button -->
    <button
      id="menuBtn"
      type="button"
      class="md:hidden p-2 rounded-lg text-yellow-400 focus:outline-none focus:ring-2 focus:ring-yellow-400"
      [attr.aria-label]="isMobileMenuOpen ? 'Close menu' : 'Open menu'"
      [attr.aria-expanded]="isMobileMenuOpen"
      (click)="toggleMobileMenu()"
    >
      <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16" />
      </svg>
    </button>

    <!-- Desktop links -->
    <ul class="hidden md:flex items-center gap-6 font-bold">
      <li><a href="#about" class="text-white hover:text-yellow-400 transition-colors">About</a></li>
      <li>
        <a href="#circuits" class="text-white hover:text-yellow-400 transition-colors">Circuits</a>
      </li>
      <li>
        <a href="#contact" class="text-white hover:text-yellow-400 transition-colors">Contact</a>
      </li>
      <li>
        <a
          href="#circuits"
          class="bg-yellow-400 text-teal-deep px-4 py-2 rounded-full font-display font-bold hover:bg-buddy-amber transition-colors"
        >
          Shop kits
        </a>
      </li>
    </ul>
  </nav>

  <!-- Mobile dropdown -->
  <ul
    id="mobileMenu"
    class="md:hidden flex-col bg-teal-deep border-t border-teal-trace/40 px-4 pb-4 font-bold text-lg"
    [class.hidden]="!isMobileMenuOpen"
  >
    <li>
      <a
        href="#about"
        class="block py-3 border-b text-gray-200 border-teal-trace/30"
        (click)="closeMobileMenu()"
        >About</a
      >
    </li>
    <li>
      <a
        href="#circuits"
        class="block py-3 border-b text-gray-200 border-teal-trace/30"
        (click)="closeMobileMenu()"
        >Circuits</a
      >
    </li>
    <li>
      <a href="#contact" class="block py-3 text-gray-200" (click)="closeMobileMenu()">Contact</a>
    </li>
  </ul>
</header>
