<!-- ============ HERO ============ -->
<section
  class="w-full mx-auto"
  style="
    background-image: url('/assets/circuit-buddy-bg-seamless.jpg');
    background-size: 250px auto;
  "
>
  <div class="w-full bg-[#237b796e]">
    <div class="max-w-6xl mx-auto px-6 pt-8 pb-16 md:pt-14 md:pb-24 text-center">
      <div class="flex flex-row justify-center pb-10">
        @if (i18n.lang() !== 'en') {
          <div
            class="flex flex-row justify-center text-base font-semibold text-gray-200 px-3 py-1 rounded-full bg-teal-700 hover:bg-teal-800/40 max-w-52 border border-teal-400 cursor-pointer"
            (click)="i18n.setLang('en')"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 -960 960 960"
              fill="#ebe6e7"
              class="inline-block w-5 mr-2"
            >
              <path
                d="M325-111.5q-73-31.5-127.5-86t-86-127.5Q80-398 80-480.5t31.5-155q31.5-72.5 86-127t127.5-86Q398-880 480.5-880t155 31.5q72.5 31.5 127 86t86 127Q880-563 880-480.5T848.5-325q-31.5 73-86 127.5t-127 86Q563-80 480.5-80T325-111.5ZM480-162q26-36 45-75t31-83H404q12 44 31 83t45 75Zm-104-16q-18-33-31.5-68.5T322-320H204q29 50 72.5 87t99.5 55Zm208 0q56-18 99.5-55t72.5-87H638q-9 38-22.5 73.5T584-178ZM170-400h136q-3-20-4.5-39.5T300-480q0-21 1.5-40.5T306-560H170q-5 20-7.5 39.5T160-480q0 21 2.5 40.5T170-400Zm216 0h188q3-20 4.5-39.5T580-480q0-21-1.5-40.5T574-560H386q-3 20-4.5 39.5T380-480q0 21 1.5 40.5T386-400Zm268 0h136q5-20 7.5-39.5T800-480q0-21-2.5-40.5T790-560H654q3 20 4.5 39.5T660-480q0 21-1.5 40.5T654-400Zm-16-240h118q-29-50-72.5-87T584-782q18 33 31.5 68.5T638-640Zm-234 0h152q-12-44-31-83t-45-75q-26 36-45 75t-31 83Zm-200 0h118q9-38 22.5-73.5T376-782q-56 18-99.5 55T204-640Z"
              />
            </svg>
            English
          </div>
        }
        @if (i18n.lang() !== 'si') {
          <div
            class="flex flex-row justify-center text-base font-semibold text-gray-200 px-3 py-1 rounded-full bg-teal-700 hover:bg-teal-800/40 max-w-52 border border-teal-400 cursor-pointer"
            (click)="i18n.setLang('si')"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 -960 960 960"
              fill="#ebe6e7"
              class="inline-block w-5 mr-2"
            >
              <path
                d="M325-111.5q-73-31.5-127.5-86t-86-127.5Q80-398 80-480.5t31.5-155q31.5-72.5 86-127t127.5-86Q398-880 480.5-880t155 31.5q72.5 31.5 127 86t86 127Q880-563 880-480.5T848.5-325q-31.5 73-86 127.5t-127 86Q563-80 480.5-80T325-111.5ZM480-162q26-36 45-75t31-83H404q12 44 31 83t45 75Zm-104-16q-18-33-31.5-68.5T322-320H204q29 50 72.5 87t99.5 55Zm208 0q56-18 99.5-55t72.5-87H638q-9 38-22.5 73.5T584-178ZM170-400h136q-3-20-4.5-39.5T300-480q0-21 1.5-40.5T306-560H170q-5 20-7.5 39.5T160-480q0 21 2.5 40.5T170-400Zm216 0h188q3-20 4.5-39.5T580-480q0-21-1.5-40.5T574-560H386q-3 20-4.5 39.5T380-480q0 21 1.5 40.5T386-400Zm268 0h136q5-20 7.5-39.5T800-480q0-21-2.5-40.5T790-560H654q3 20 4.5 39.5T660-480q0 21-1.5 40.5T654-400Zm-16-240h118q-29-50-72.5-87T584-782q18 33 31.5 68.5T638-640Zm-234 0h152q-12-44-31-83t-45-75q-26 36-45 75t-31 83Zm-200 0h118q9-38 22.5-73.5T376-782q-56 18-99.5 55T204-640Z"
              />
            </svg>
            සිංහල
          </div>
        }
      </div>
      <!-- Big mascot -->
      <img
        src="/assets/circuit-buddy-web-logo.png"
        alt="Circuit Buddy logo"
        class="h-35 md:h-50 mx-auto mb-4 drop-shadow-lg"
      />

      <p
        class="font-display font-bold text-cream text-xl md:text-2xl italic"
        [innerHTML]="'hero.tagline' | t"
      ></p>

      <p class="max-w-xl mx-auto mt-6 text-base md:text-lg text-cream/90 leading-relaxed">
        {{ 'hero.subtitle' | t }}
      </p>

      <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-3">
        <a
          href="#circuits"
          class="w-full sm:w-auto bg-yellow-400 text-teal-deep font-display font-bold text-lg px-8 py-3 rounded-full shadow-lg hover:bg-buddy-amber hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-4 focus:ring-yellow-400/50"
        >
          {{ 'hero.browse' | t }}
        </a>
        <a
          href="#about"
          class="w-full sm:w-auto border-2 border-yellow-400 text-yellow-400 font-display font-bold text-lg px-8 py-3 rounded-full hover:bg-yellow-400 hover:text-teal-deep transition-all focus:outline-none focus:ring-4 focus:ring-yellow-400/50"
        >
          {{ 'hero.how' | t }}
        </a>
      </div>

      <!-- Badges, styled like the package footer -->
      <div class="mt-10 flex flex-wrap items-center justify-center gap-3 text-sm">
        <span
          class="inline-flex items-center gap-2 text-cream bg-teal-deep/80 border border-teal-trace/50 px-4 py-2 rounded-full font-bold"
        >
          <svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
            <path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z" />
          </svg>
          {{ 'hero.badge.usbc' | t }}
        </span>
        <span
          class="inline-flex items-center gap-2 text-cream bg-teal-deep/80 border border-teal-trace/50 px-4 py-2 rounded-full font-bold"
        >
          <svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2 3 7v10l9 5 9-5V7l-9-5zm0 2.2 6.8 3.8L12 11.8 5.2 8 12 4.2z" />
          </svg>
          {{ 'hero.badge.noExp' | t }}
        </span>
        <span
          class="inline-flex items-center gap-2 text-cream bg-teal-deep/80 border border-teal-trace/50 px-4 py-2 rounded-full font-bold"
        >
          <svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"
            />
          </svg>
          {{ 'hero.badge.beginners' | t }}
        </span>
      </div>
    </div>
  </div>
</section>
