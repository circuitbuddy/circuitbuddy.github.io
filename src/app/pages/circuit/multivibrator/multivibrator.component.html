<!-- ============ MULTIVIBRATOR CIRCUIT ============ -->
<main
  class="w-full mx-auto"
  style="
    background-image: url('/assets/circuit-buddy-bg-seamless.jpg');
    background-size: 200px auto;
  "
>
  <div class="w-full bg-[#237b796e] min-h-[100vh]">
    <div class="max-w-4xl mx-auto px-6 py-14 md:py-20">
      <!-- Back link -->
      <a
        routerLink="/"
        fragment="circuits"
        class="inline-flex items-center gap-2 font-mono text-lg text-buddy-yellow hover:text-buddy-amber transition-colors"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        {{ 'circuit.back' | t }}
      </a>

      <p class="font-mono text-sm tracking-widest uppercase text-buddy-yellow mt-8 mb-2">
        // circuit
      </p>
      <h1 class="font-display font-800 text-4xl md:text-5xl text-cream">
        {{ 'product.multivibrator.title' | t }}
      </h1>

      <p class="mt-4 text-lg text-cream/90 leading-relaxed max-w-2xl" [innerHTML]="'circuit.multivibrator.p1' | t"></p>

      <p class="mt-4 text-base text-cream/80 leading-relaxed max-w-2xl" [innerHTML]="'circuit.multivibrator.p2' | t"></p>
    </div>
  </div>
</main>
