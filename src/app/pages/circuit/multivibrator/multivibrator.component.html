<!-- ============ MULTIVIBRATOR CIRCUIT ============ -->
<main
  class="w-full mx-auto"
  style="
    background-image: url('/assets/circuit-buddy-bg-seamless.jpg');
    background-size: 200px auto;
  "
>
  <div class="w-full bg-[#237b796e] min-h-[100vh]">
    <div class="max-w-4xl mx-auto px-6 py-14 md:py-20">
      <!-- Back link -->
      <a
        href="#"
        appScrollTo="circuits"
        class="inline-flex items-center gap-2 font-mono text-lg text-buddy-yellow hover:text-buddy-amber transition-colors"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        {{ 'circuit.back' | t }}
      </a>

      <p class="font-mono text-sm tracking-widest uppercase text-buddy-yellow mt-8 mb-2">
        // circuit
      </p>
      <h1 class="font-display font-800 text-4xl md:text-5xl text-cream">
        {{ 'circuit.multivibrator.title' | t }}
      </h1>

      <p
        class="mt-4 text-lg text-cream/90 leading-relaxed max-w-2xl"
        [innerHTML]="'circuit.multivibrator.p1' | t"
      ></p>

      <p
        class="mt-4 text-base text-cream/80 leading-relaxed max-w-2xl"
        [innerHTML]="'circuit.multivibrator.p2' | t"
      ></p>

      <!-- Interactive PCB preview: zoom, drag to pan, tap a part -->
      <div class="mt-8">
        <app-pcb-preview
          image="multivibrator.png"
          [config]="pcbConfig"
          (partClick)="onPartClick($event)"
          class="max-w-lg"
        ></app-pcb-preview>

        <p class="mt-5 text-base text-cream">
          @if (selectedPart(); as part) {
            <div class="flex flex-col gap-2 items-start bg-cream rounded-xl py-4 px-6 shadow-sm">
              <div class="">
                <span class="text-gray-700 font-semibold text-xl">{{ part.name }}</span>
              </div>
            </div>
          } @else {
            <div
              class="flex-row rounded-md bg-[#f0b00052] p-2 inline-flex border-l-3 border-buddy-yellow"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 -960 960 960"
                fill="#fff9e8"
                class="w-5 mr-1.5"
              >
                <path
                  d="M440-280h80v-240h-80v240Zm68.5-331.5Q520-623 520-640t-11.5-28.5Q497-680 480-680t-28.5 11.5Q440-657 440-640t11.5 28.5Q463-600 480-600t28.5-11.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
                />
              </svg>
              වැඩිදුර තොරතුරු දැනගන්න එක් එක් උපාංගය උඩ click කරන්න
            </div>
          }
        </p>
      </div>
    </div>
  </div>
</main>
